<!DOCTYPE html>
<html>

<head>

    <!-- ========================= -->
    <!-- CONFIGURAÇÕES DA PÁGINA -->
    <!-- ========================= -->

    <!-- título da aba -->
    <title>KLodge AI</title>

    <!-- faz o site funcionar bem no celular -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <style>

        /* ========================= */
        /* BODY */
        /* ========================= */

        /*
        body = corpo inteiro do site

        aqui controlamos:
        - fundo
        - fonte
        - alinhamento geral
        */

        body{

            /* remove bordas brancas */
            margin:0;

            /* fonte do site */
            font-family:Arial;

            /* cor do fundo */
            background:#dfe9e8;

            /*
            display:flex
            ativa sistema flexbox

            flexbox ajuda:
            - alinhar
            - centralizar
            - organizar elementos
            */
            display:flex;

            /*
            centraliza horizontalmente
            */
            justify-content:center;
        }


        /* ========================= */
        /* CONTAINER PRINCIPAL */
        /* ========================= */

        /*
        chat-container =
        caixa principal do chat
        */

        .chat-container{

            /*
            ocupa quase toda largura
            */
            width:95%;

            /*
            limite máximo no PC
            */
            max-width:700px;

            /*
            altura da tela inteira
            */
            height:100dvh;

            /*
            ativa flexbox
            */
            display:flex;

            /*
            coloca itens em coluna
            */
            flex-direction:column;

            /*
            fundo do chat
            */
            background:#f2f2f2;
        }


        /* ========================= */
        /* HEADER */
        /* ========================= */

        /*
        topo verde
        */

        .header{

            background:#0f766e;

            color:white;

            padding:18px;

            /*
            tamanho da letra
            */
            font-size:22px;

            font-weight:bold;

            /*
            centraliza texto
            */
            text-align:center;
        }


        /* ========================= */
        /* CAIXA DAS MENSAGENS */
        /* ========================= */

        .chat-box{

            /*
            ocupa espaço restante
            */
            flex:1;

            /*
            ativa scroll
            */
            overflow-y:auto;

            padding:15px;

            display:flex;

            flex-direction:column;

            /*
            espaço entre mensagens
            */
            gap:15px;
        }


        /* ========================= */
        /* MENSAGENS */
        /* ========================= */

        .message{

            /*
            largura máxima da mensagem
            */
            max-width:75%;

            padding:12px;

            border-radius:15px;

            line-height:1.5;

            /*
            quebra palavras grandes
            */
            word-wrap:break-word;
        }


        /* ========================= */
        /* MENSAGEM USUÁRIO */
        /* ========================= */

        .user{

            /*
            manda mensagem pra direita
            */
            align-self:flex-end;

            background:#0f766e;

            color:white;
        }


        /* ========================= */
        /* MENSAGEM IA */
        /* ========================= */

        .bot{

            /*
            manda mensagem pra esquerda
            */
            align-self:flex-start;

            background:white;

            color:black;
        }


        /* ========================= */
        /* ÁREA INPUT */
        /* ========================= */

        .input-area{

            display:flex;

            padding:10px;

            background:white;

            border-top:1px solid #ccc;
        }


        /* ========================= */
        /* INPUT */
        /* ========================= */

        input{

            /*
            ocupa espaço disponível
            */
            flex:1;

            padding:15px;

            border-radius:10px;

            border:1px solid #ccc;

            font-size:18px;

            /*
            remove borda azul
            */
            outline:none;
        }


        /* ========================= */
        /* BOTÃO */
        /* ========================= */

        button{

            margin-left:10px;

            padding:15px 18px;

            border:none;

            background:#0f766e;

            color:white;

            border-radius:10px;

            font-size:16px;

            cursor:pointer;
        }

    </style>

</head>

<body>

    <!-- ========================= -->
    <!-- CONTAINER PRINCIPAL -->
    <!-- ========================= -->

    <div class="chat-container">

        <!-- ========================= -->
        <!-- HEADER -->
        <!-- ========================= -->

        <div class="header">
            🌴 KLodge AI Assistant
        </div>


        <!-- ========================= -->
        <!-- CHAT -->
        <!-- ========================= -->

        <div
            class="chat-box"
            id="chat-box"
        ></div>


        <!-- ========================= -->
        <!-- INPUT -->
        <!-- ========================= -->

        <div class="input-area">

            <input

                type="text"

                id="message"

                placeholder="Pergunte algo..."

            >

            <button onclick="sendMessage()">
                Enviar
            </button>

        </div>

    </div>


    <script>

        /* ========================= */
        /* FUNÇÃO ENVIAR */
        /* ========================= */

        async function sendMessage(){

            // pega input
            let input =
                document.getElementById(
                    "message"
                );

            // pega texto
            let message =
                input.value;


            // impede mensagem vazia
            if(message.trim() === ""){
                return;
            }


            // pega chat-box
            let chatBox =
                document.getElementById(
                    "chat-box"
                );


            /* ========================= */
            /* MOSTRAR MENSAGEM USUÁRIO */
            /* ========================= */

            chatBox.innerHTML += `

                <div class="message user">
                    ${message}
                </div>

            `;


            // limpa input
            input.value = "";


            /* ========================= */
            /* LOADING */
            /* ========================= */

            chatBox.innerHTML += `

                <div
                    class="message bot"
                    id="loading"
                >
                    Pensando...
                </div>

            `;


            // desce scroll
            chatBox.scrollTop =
                chatBox.scrollHeight;


            /* ========================= */
            /* ENVIAR PARA FLASK */
            /* ========================= */

            let response = await fetch(

                "/chat",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":
                        "application/json"

                    },

                    body:JSON.stringify({

                        message:message

                    })

                }

            );


            /* ========================= */
            /* VERIFICAR ERRO */
            /* ========================= */

            if(!response.ok){

                document.getElementById(
                    "loading"
                ).innerText =
                    "Erro no servidor";

                return;
            }


            /* ========================= */
            /* RECEBER RESPOSTA */
            /* ========================= */

            let data =
                await response.json();


            /* ========================= */
            /* REMOVER LOADING */
            /* ========================= */

            document.getElementById(
                "loading"
            ).remove();


            /* ========================= */
            /* MOSTRAR IA */
            /* ========================= */

            chatBox.innerHTML += `

                <div class="message bot">
                    ${data.reply}
                </div>

            `;


            // desce scroll
            chatBox.scrollTop =
                chatBox.scrollHeight;
        }


        /* ========================= */
        /* ENTER */
        /* ========================= */

        document

        .getElementById("message")

        .addEventListener(

            "keypress",

            function(event){

                if(event.key === "Enter"){

                    sendMessage();

                }

            }

        );

    </script>

</body>

</html>
