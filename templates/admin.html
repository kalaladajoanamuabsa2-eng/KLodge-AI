<!DOCTYPE html>
<html>

<head>

    <title>
        Admin Panel
    </title>

    <style>

        body{

            font-family:Arial;

            padding:20px;

            background:#f2f2f2;
        }

        textarea{

            width:100%;

            height:400px;

            font-size:16px;

            padding:10px;
        }

        button{

            margin-top:20px;

            padding:15px;

            font-size:16px;

            background:#0f766e;

            color:white;

            border:none;
        }

    </style>

</head>

<body>

    <h1>
        KLodge Admin Panel
    </h1>

    <form action="/save" method="POST">

        <textarea
            name="content"
        >{{ content }}</textarea>

        <br>

        <button type="submit">

            Salvar

        </button>

    </form>

</body>

</html>
